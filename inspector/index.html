<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Rule Relation Inspector</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #fafafa; --panel: #fff; --border: #e2e2e2; --text: #2e2e2e; --muted: #8a8a8a;
    --prohibition: #d9534f; --prescription: #7cb854; --preference: #e0a23f;
    --permission: #4aa3d8; --context: #9e9e9e;
    --agree: #5a9e4b; --unsure: #d8a13a; --reject: #cf4f44;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ---------- header ---------- */
  header { display: flex; align-items: center; gap: 16px; padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .tabs { display: flex; gap: 6px; }
  .tab { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; font-size: 13px; color: var(--muted); }
  .tab.active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
  .progress { margin-left: auto; font-size: 12px; color: var(--muted); display: flex; gap: 14px; align-items: center; }
  .progress b { color: var(--text); }
  .pbar { width: 140px; height: 6px; background: #ececec; border-radius: 3px; overflow: hidden; }
  .pbar > div { height: 100%; background: var(--agree); transition: width .25s; }

  main { flex: 1; display: flex; min-height: 0; }

  /* ---------- top-main: source file (editor) ---------- */
  #source-pane { flex: 1; display: flex; flex-direction: column; background: var(--panel); min-height: 60px; position: relative; }
  .src-head { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 12.5px; font-weight: 600; flex-shrink: 0; }
  .src-head #src-name { color: var(--text); }
  .src-head #src-link { margin-left: auto; font-size: 11px; color: #6c5ce7; text-decoration: none; font-weight: 600; }
  #src-body { flex: 1; overflow-y: auto; padding: 8px 0 40vh; font: 12px/1.6 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .srcline { display: flex; padding: 0 12px; white-space: pre-wrap; }
  .srcline .lnno { flex-shrink: 0; width: 34px; text-align: right; padding-right: 12px; color: #c2c2c2; user-select: none; }
  .srcline .lntext { flex: 1; color: #555; word-break: break-word; }
  /* letter-level highlight. Every extracted rule/context span = grey (atomic);
     current edge SOURCE = red, TARGET = blue, overlap = purple. */
  .lntext .hl-atom { background: #e6e6e6; border-radius: 2px; }
  .lntext .hl-src  { background: #ffd2d2; border-radius: 2px; box-shadow: inset 0 -1px 0 #e88; }
  .lntext .hl-tgt  { background: #d2e2ff; border-radius: 2px; box-shadow: inset 0 -1px 0 #88a; }
  .lntext .hl-both { background: #e9d6f4; border-radius: 2px; box-shadow: inset 0 -1px 0 #a8c; }
  .lntext .hl-src, .lntext .hl-tgt, .lntext .hl-both { color: #1a1a1a; }
  .lntext [data-nid] { cursor: pointer; }
  .lntext [data-nid].pick-src { outline: 2px solid #e05a4f; outline-offset: 1px; }
  .lntext [data-nid].pick-tgt { outline: 2px solid #3b7dd8; outline-offset: 1px; }

  /* selection bar (build a relation from two picked spans) */
  #sel-bar { position: absolute; left: 50%; transform: translateX(-50%); bottom: 10px; z-index: 20;
    display: none; align-items: center; gap: 10px; background: #2e2e2e; color: #fff;
    padding: 8px 14px; border-radius: 10px; font-size: 12.5px; box-shadow: 0 4px 14px rgba(0,0,0,.25); }
  #sel-bar.show { display: flex; }
  #sel-bar .pill { padding: 2px 9px; border-radius: 8px; font-weight: 700; }
  #sel-bar .pill.s { background: #e05a4f; } #sel-bar .pill.t { background: #3b7dd8; }
  #sel-bar .pill.empty { background: #555; color: #bbb; font-weight: 400; }
  #sel-bar button { background: #4a4a4a; color: #fff; border: none; border-radius: 7px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  #sel-bar button:hover { background: #5d5d5d; }
  #sel-bar button.go { background: #6c5ce7; font-weight: 600; }
  #sel-bar .arrow { color: #aaa; }

  /* add-rule popup (from a raw text selection) */
  #add-rule-pop { position: absolute; z-index: 30; display: none; background: #fff; border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,.18); padding: 8px; }
  #add-rule-pop.show { display: block; }
  #add-rule-pop .arp-label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin: 2px 4px 6px; }
  #add-rule-pop .arp-types { display: flex; gap: 5px; }
  #add-rule-pop .arp-types button { border: 1px solid var(--border); background: #fff; border-radius: 7px; padding: 5px 9px; cursor: pointer; font-size: 11.5px; font-weight: 600; }
  #add-rule-pop .arp-types button:hover { filter: brightness(0.97); }
  .clear-btn { width: 100%; padding: 7px; border-radius: 7px; border: 1px solid #eccfcc; background: #fff; color: var(--reject); cursor: pointer; font-size: 12px; margin-top: 6px; }
  .clear-btn:hover { background: #fbeeec; }

  /* ---------- bottom-main: edge inspector (panel) ---------- */
  #inspector { height: 44vh; flex-shrink: 0; overflow-y: auto; padding: 20px 28px; min-height: 80px; border-top: 1px solid var(--border); background: var(--bg); }
  .edge-stage { display: grid; grid-template-columns: 1fr 200px 1fr; gap: 0; align-items: stretch; margin-bottom: 4px; }
  .node-card { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 10px 13px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .node-card .nc-top { display: flex; align-items: center; gap: 6px; }
  .node-card .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; vertical-align: -1px; border: 2px solid rgba(0,0,0,.18); }
  .node-card .nid { font-weight: 700; font-size: 12.5px; }
  .node-card .ntype { font-size: 10px; letter-spacing: .05em; color: var(--muted); }
  .node-card .nc-top .role { margin-left: auto; font-size: 9.5px; color: #bbb; text-transform: uppercase; letter-spacing: .05em; font-weight: 700; }
  .node-card h3 { margin: 5px 0 6px; font-size: 13.5px; line-height: 1.3; }
  .prov-row { margin-top: 2px; }
  .prov { font-size: 10.5px; color: var(--muted); white-space: nowrap; }
  /* tie each card to its source-pane highlight color */
  .role.src, .prov.src { color: #c0392b; }
  .role.tgt, .prov.tgt { color: #2b6cb0; }

  .arrow-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 6px; }
  .arrow-line { width: 100%; display: flex; align-items: center; }
  .arrow-line .shaft { flex: 1; height: 2px; background: #777; }
  .arrow-line .head { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 9px solid #777; }
  .rel-chip { margin-top: 10px; padding: 4px 14px; border-radius: 14px; font-size: 12.5px; font-weight: 600; border: 1px solid; white-space: nowrap; }
  .user-flag { margin-top: 6px; font-size: 10.5px; color: #6c5ce7; font-weight: 600; }


  .annotate { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-top: 14px; }
  .annotate .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .annotate .label { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .mark-btn { padding: 6px 16px; border-radius: 7px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); }
  .mark-btn[data-m="agree"].on  { border-color: var(--agree);  color: var(--agree);  background: #f0f7ee; }
  .mark-btn[data-m="unsure"].on { border-color: var(--unsure); color: var(--unsure); background: #fbf4e6; }
  .mark-btn[data-m="reject"].on { border-color: var(--reject); color: var(--reject); background: #fbeeec; }
  textarea#comment { width: 100%; margin-top: 10px; min-height: 64px; border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; font: 13px/1.5 inherit; resize: vertical; }
  textarea#comment:focus { outline: none; border-color: #6c5ce7; }
  .savestate { font-size: 11px; color: var(--muted); margin-left: auto; }

  .nav { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
  .nav button { padding: 6px 14px; border-radius: 7px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; }
  .nav button:hover { border-color: #aaa; }
  .nav .pos { font-size: 12px; color: var(--muted); }
  .nav .hint { margin-left: auto; font-size: 11px; color: #bbb; }
  .del-btn { color: var(--reject); border-color: #eccfcc !important; }

  /* ---------- left: relation list (VSCode Explorer) ---------- */
  #sidebar { width: 300px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  #sidebar .sb-head { padding: 10px 12px 8px; border-bottom: 1px solid var(--border); }
  #sidebar .sb-head .title { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; }
  .filters { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .fchip { font-size: 10.5px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--muted); }
  .fchip.on { color: #fff; border-color: transparent; }
  select.fsel { font-size: 10.5px; border: 1px solid var(--border); border-radius: 10px; padding: 2px 6px; color: var(--muted); background: #fff; }
  #edge-list { flex: 1; overflow-y: auto; }
  /* compact one-liner: "R03 → R04   support   ✓" */
  .edge-item { padding: 5px 12px; border-bottom: 1px solid #f4f4f4; cursor: pointer; display: flex; gap: 8px; align-items: center; font-size: 12px; white-space: nowrap; }
  .edge-item:hover { background: #f7f7fb; }
  .edge-item.sel { background: #efedfb; box-shadow: inset 3px 0 0 #6c5ce7; }
  .edge-item .epair { font-weight: 700; color: #3a3a3a; flex-shrink: 0; }
  .edge-item .etype { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
  .edge-item .cdot { font-size: 10px; opacity: .8; flex-shrink: 0; }
  .edge-item .status { margin-left: auto; flex-shrink: 0; font-size: 12.5px; }
  .edge-item.userrow .epair::before { content: "✎ "; color: #6c5ce7; font-weight: 400; }
  .add-bar { padding: 10px 12px; border-top: 1px solid var(--border); }

  /* ---------- resizable splitters (VSCode-style) ---------- */
  #main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .divider { background: transparent; flex-shrink: 0; transition: background .12s; }
  .divider:hover, .divider.dragging { background: #6c5ce7; }
  .divider-v { width: 6px; cursor: col-resize; }
  .divider-h { height: 6px; cursor: row-resize; }
  .add-bar button { width: 100%; padding: 8px; border-radius: 7px; border: 1px dashed #b9b1ec; background: #f6f5fd; color: #6c5ce7; font-weight: 600; cursor: pointer; font-size: 13px; }

  /* ---------- add-edge modal ---------- */
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 50; }
  #modal.open { display: flex; }
  .modal-box { background: #fff; border-radius: 12px; padding: 22px 24px; width: 560px; max-width: 92vw; }
  .modal-box h2 { margin: 0 0 14px; font-size: 16px; }
  .modal-box label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 12px 0 4px; }
  .modal-box select, .modal-box textarea { width: 100%; border: 1px solid var(--border); border-radius: 7px; padding: 7px 9px; font: 13px inherit; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .modal-actions button { padding: 7px 16px; border-radius: 7px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 13px; }
  .modal-actions .primary { background: #6c5ce7; color: #fff; border-color: #6c5ce7; font-weight: 600; }
  .empty-state { color: var(--muted); text-align: center; margin-top: 80px; }
</style>
</head>
<body>
<header>
  <h1>⇄ Rule Relation Inspector</h1>
  <div class="tabs" id="tabs"></div>
  <div class="progress">
    <span><b id="p-done">0</b>/<span id="p-total">0</span> reviewed</span>
    <div class="pbar"><div id="p-fill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <aside id="sidebar">
    <div class="sb-head">
      <div class="title"><span id="sb-title">Relations</span><span id="sb-count"></span></div>
      <div class="filters" id="filters"></div>
    </div>
    <div id="edge-list"></div>
    <div class="add-bar">
      <button onclick="openModal()">＋ Add relation</button>
      <button class="clear-btn" id="clear-btn" onclick="clearAllRelations()">Clear all relations</button>
    </div>
  </aside>

  <div class="divider divider-v" id="div-v" title="Drag to resize"></div>

  <div id="main-area">
    <section id="source-pane">
      <div class="src-head">
        <span id="src-name">source</span>
        <span style="margin-left:auto;font-size:11px;color:#aaa;font-weight:400">click a grey span to pick · shift-click for 2nd · select text to add a rule</span>
        <a id="src-link" href="#" target="_blank" rel="noopener" title="Open source on GitHub" style="margin-left:12px">↗ source</a>
      </div>
      <div id="src-body"></div>
      <div id="sel-bar">
        <span class="pill empty" id="sel-s">pick source</span>
        <span class="arrow">→</span>
        <span class="pill empty" id="sel-t">pick target</span>
        <button onclick="swapSel()">⇄ swap</button>
        <button class="go" onclick="addRelationFromSel()">⌘⏎ add</button>
        <button onclick="clearSel()">✕</button>
      </div>
      <div id="add-rule-pop"><div class="arp-label">Add selection as…</div><div class="arp-types" id="arp-types"></div></div>
    </section>

    <div class="divider divider-h" id="div-h" title="Drag to resize"></div>

    <section id="inspector"><div class="empty-state">Loading…</div></section>
  </div>
</main>

<div id="modal">
  <div class="modal-box">
    <h2>Add a relation</h2>
    <label>Source node</label><select id="m-source"></select>
    <label>Relation type</label>
    <select id="m-type">
      <option>refinement</option><option>exception</option><option>support</option>
      <option>support (defines)</option><option>support (exemplifies)</option><option>support (motivates)</option>
      <option>checkpoint</option><option>conflict</option><option>duplication</option>
    </select>
    <label>Target node</label><select id="m-target"></select>
    <label>Your rationale (optional)</label><textarea id="m-rationale" rows="3"></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="submitEdge()">Add relation</button>
    </div>
  </div>
</div>

<script>
const TYPE_COLOR = {
  PROHIBITION: 'var(--prohibition)', PRESCRIPTION: 'var(--prescription)',
  PREFERENCE: 'var(--preference)', PERMISSION: 'var(--permission)',
  CONTEXT: 'var(--context)', UNKNOWN: '#ccc',
};
const TYPE_ICON = { PROHIBITION: '🚫', PRESCRIPTION: '✅', PREFERENCE: '💡', PERMISSION: '🔓', CONTEXT: '🗒' };
const REL_COLOR = {
  refinement: '#7d6bd9', exception: '#cf4f44', support: '#5a9e4b',
  'support (defines)': '#5a9e4b', 'support (exemplifies)': '#5a9e4b', 'support (motivates)': '#5a9e4b',
  checkpoint: '#4aa3d8', conflict: '#e0762f', duplication: '#888',
};
const MARK_ICON = { agree: '✓', unsure: '?', reject: '✗' };
const MARK_COLOR = { agree: 'var(--agree)', unsure: 'var(--unsure)', reject: 'var(--reject)' };

let projects = [], project = null, data = null, ann = {edges:{}, added:[], nodes:[], cleared:false};
let edges = [], idx = 0, typeFilter = 'all', markFilter = 'all';
let saveTimer = null;
let selSource = null, selTarget = null;     // node ids picked in the source pane
const REL_TYPES = ['refinement','exception','support','support (defines)','support (exemplifies)','support (motivates)','checkpoint','conflict','duplication'];

const $ = s => document.querySelector(s);

async function init() {
  setupResizers();
  projects = await (await fetch('/api/projects')).json();
  const saved = localStorage.getItem('rri-project');
  renderTabs();
  await loadProject(projects.includes(saved) ? saved : projects[0]);
}

// Draggable splitters: sidebar width (vertical) and inspector height (horizontal).
// Sizes persist in localStorage.
function setupResizers() {
  const sidebar = $('#sidebar'), inspector = $('#inspector');
  const sw = +localStorage.getItem('rri-sidebar-w'); if (sw) sidebar.style.width = sw + 'px';
  const ih = +localStorage.getItem('rri-inspector-h'); if (ih) inspector.style.height = ih + 'px';

  drag($('#div-v'), 'col', e => {
    const w = Math.min(Math.max(e.clientX - sidebar.getBoundingClientRect().left, 180), 640);
    sidebar.style.width = w + 'px';
    localStorage.setItem('rri-sidebar-w', w);
  });
  drag($('#div-h'), 'row', e => {
    const area = $('#main-area').getBoundingClientRect();
    const h = Math.min(Math.max(area.bottom - e.clientY, 120), area.height - 120);
    inspector.style.height = h + 'px';
    localStorage.setItem('rri-inspector-h', Math.round(h));
  });

  function drag(handle, axis, onMove) {
    handle.addEventListener('mousedown', ev => {
      ev.preventDefault();
      handle.classList.add('dragging');
      document.body.style.cursor = axis === 'col' ? 'col-resize' : 'row-resize';
      document.body.style.userSelect = 'none';
      const move = e => onMove(e);
      const up = () => {
        handle.classList.remove('dragging');
        document.body.style.cursor = ''; document.body.style.userSelect = '';
        window.removeEventListener('mousemove', move);
        window.removeEventListener('mouseup', up);
      };
      window.addEventListener('mousemove', move);
      window.addEventListener('mouseup', up);
    });
  }
}

function renderTabs() {
  $('#tabs').innerHTML = projects.map(p =>
    `<button class="tab ${p===project?'active':''}" onclick="loadProject('${p}')">${p}</button>`).join('');
}

async function loadProject(p) {
  project = p;
  localStorage.setItem('rri-project', p);
  [data, ann] = await Promise.all([
    (await fetch('/api/data/'+p)).json(),
    (await fetch('/api/annotations/'+p)).json(),
  ]);
  mergeUserNodes();
  clearSel();
  rebuildEdges();
  idx = Math.min(parseInt(localStorage.getItem('rri-idx-'+p) || '0'), Math.max(edges.length-1, 0));
  typeFilter = 'all'; markFilter = 'all';
  renderSourceShell();
  renderTabs(); renderAll();
}

// Fold user-added nodes (created from text selections) into data.nodes so they
// behave like any other node (selectable, linkable, grey-highlighted).
function mergeUserNodes() {
  for (const n of (ann.nodes || [])) {
    data.nodes[n.id] = { ...n, paraphrase: n.text, verbatim: true, judgment: '' };
  }
}

let srcLines = [], srcLineOffsets = [], srcCharOwner = [];

// Render the source file and precompute, for each character, the smallest node
// that covers it (so every extracted span shows grey and is clickable).
function renderSourceShell() {
  $('#src-name').textContent = data.source_name || project;
  const link = $('#src-link');
  if (data.source_url) { link.href = data.source_url; link.style.display = ''; }
  else link.style.display = 'none';
  const text = data.source_text || '';
  if (!text) { $('#src-body').innerHTML = '<div class="empty-state" style="margin-top:30px">Source file not available.</div>'; return; }
  srcLines = text.split('\n');
  srcLineOffsets = []; let o = 0;
  for (const ln of srcLines) { srcLineOffsets.push(o); o += ln.length + 1; }
  // smallest covering node per char → grey "atomic" highlight + click target
  srcCharOwner = new Array(text.length).fill(null);
  const sized = Object.values(data.nodes).filter(n => n.char_start != null)
    .map(n => [n.char_start, n.char_end, n.id]).sort((a, b) => (b[1]-b[0]) - (a[1]-a[0]));
  for (const [s, e, id] of sized) for (let c = s; c < e && c < text.length; c++) srcCharOwner[c] = id;
  $('#src-body').innerHTML = srcLines.map((ln, i) =>
    `<div class="srcline" id="srcl-${i+1}"><span class="lnno">${i+1}</span><span class="lntext">${esc(ln) || ' '}</span></div>`).join('');
  paintSource(false);
}

// The pair currently driving the highlight: the active selection if any, else
// the inspected edge's endpoints.
function hlPair() {
  if (selSource || selTarget) return [selSource, selTarget];
  const e = filteredEdges()[idx];
  return e ? [e.source, e.target] : [null, null];
}

// Repaint every line: grey for atomic spans, red/blue for the current pair.
function paintSource(scroll) {
  if (!srcLines.length) return;
  const [sId, tId] = hlPair();
  const sN = sId && data.nodes[sId], tN = tId && data.nodes[tId];
  const sR = sN && sN.char_start != null ? [sN.char_start, sN.char_end] : null;
  const tR = tN && tN.char_start != null ? [tN.char_start, tN.char_end] : null;
  for (let i = 0; i < srcLines.length; i++) {
    const el = $('#srcl-' + (i + 1)); if (el) el.querySelector('.lntext').innerHTML = segmentLine(i, sR, tR);
  }
  if (scroll) {
    const r = [sR, tR].filter(Boolean);
    if (r.length) {
      const firstChar = Math.min(...r.map(x => x[0]));
      let ln = srcLineOffsets.findIndex((off, i) => firstChar < off + srcLines[i].length + 1);
      if (ln < 0) ln = 0;
      const el = $('#srcl-' + (ln + 1)); if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }
}

function segmentLine(i, sR, tR) {
  const txt = srcLines[i], base = srcLineOffsets[i];
  if (!txt.length) return ' ';
  let html = '', j = 0;
  const klass = (g) => {
    const inS = sR && g >= sR[0] && g < sR[1], inT = tR && g >= tR[0] && g < tR[1];
    if (inS && inT) return 'hl-both';
    if (inS) return 'hl-src';
    if (inT) return 'hl-tgt';
    return srcCharOwner[g] ? 'hl-atom' : '';
  };
  while (j < txt.length) {
    const g0 = base + j, cls = klass(g0), owner = srcCharOwner[g0];
    let k = j + 1;
    while (k < txt.length && klass(base + k) === cls && srcCharOwner[base + k] === owner) k++;
    const seg = esc(txt.slice(j, k));
    if (!cls && !owner) html += seg;
    else html += `<span class="${cls}"${owner ? ` data-nid="${owner}"` : ''}>${seg}</span>`;
    j = k;
  }
  return html || ' ';
}

function rebuildEdges() {
  const detected = ann.cleared ? [] : data.edges;
  edges = [...detected, ...(ann.added||[])];
}

function relBase(t) { return t.startsWith('support') ? 'support' : t; }

function filteredEdges() {
  return edges.filter(e => {
    if (typeFilter !== 'all' && relBase(e.type) !== typeFilter) return false;
    const m = (ann.edges[e.id]||{}).mark;
    if (markFilter === 'unreviewed' && m) return false;
    if (['agree','unsure','reject'].includes(markFilter) && m !== markFilter) return false;
    return true;
  });
}

function renderAll() { renderInspector(); renderSidebar(); renderProgress(); }

function nodeCard(n, role) {
  if (!n) return '<div class="node-card">missing node</div>';
  const c = TYPE_COLOR[n.type] || '#ccc';
  // The rule text itself is shown (and highlighted) in the source pane above, so
  // the card stays compact: id/type, title, and the source line number.
  const side = role === 'source' ? 'src' : role === 'target' ? 'tgt' : '';
  const topColor = role === 'source' ? '#e05a4f' : role === 'target' ? '#3b7dd8' : c;
  const line = (n.line_start != null)
    ? `<div class="prov-row"><span class="prov ${side}">line ${esc(n.source_lines)}</span></div>` : '';
  return `<div class="node-card" style="border-top:3px solid ${topColor}">
    <div class="nc-top"><span class="dot" style="background:${c}"></span><span class="nid">${n.id}</span>
      <span class="ntype">${TYPE_ICON[n.type]||''} ${n.type}</span>
      <span class="role ${side}">${role}</span></div>
    <h3>${esc(n.title)}</h3>
    ${line}
  </div>`;
}

function renderInspector() {
  const list = filteredEdges();
  if (!list.length) { $('#inspector').innerHTML = '<div class="empty-state">No relations match the current filter.</div>'; return; }
  if (idx >= list.length) idx = list.length - 1;
  const e = list[idx];
  const a = ann.edges[e.id] || {};
  const src = data.nodes[e.source], tgt = data.nodes[e.target];
  const rc = REL_COLOR[e.type] || '#777';

  $('#inspector').innerHTML = `
    <div class="edge-stage">
      ${nodeCard(src, 'source')}
      <div class="arrow-zone">
        <div class="arrow-line"><div class="shaft" style="background:${rc}"></div><div class="head" style="border-left-color:${rc}"></div></div>
        <div class="rel-chip" style="color:${rc};border-color:${rc};background:${rc}18">${esc(e.type)}</div>
        ${e.user_added ? '<div class="user-flag">user-added</div>' : ''}
      </div>
      ${nodeCard(tgt, 'target')}
    </div>

    <div class="annotate">
      <div class="label">Your review</div>
      <div class="row">
        ${['agree','unsure','reject'].map(m =>
          `<button class="mark-btn ${a.mark===m?'on':''}" data-m="${m}" onclick="setMark('${e.id}','${m}')">${MARK_ICON[m]} ${m}</button>`).join('')}
        <span class="savestate" id="savestate">${a.updated_at ? 'saved ' + a.updated_at.slice(0,16).replace('T',' ') : ''}</span>
      </div>
      <textarea id="comment" placeholder="Comment on this relation… (auto-saves)"
        oninput="queueComment('${e.id}')">${esc(a.comment||'')}</textarea>
    </div>

    <div class="nav">
      <button onclick="step(-1)">← Prev</button>
      <button onclick="step(1)">Next →</button>
      <span class="pos">${idx+1} / ${list.length}</span>
      ${e.user_added ? `<button class="del-btn" onclick="removeAdded('${e.id}')">Delete this relation</button>` : ''}
      <span class="hint">←/→ navigate · 1 agree · 2 unsure · 3 reject</span>
    </div>`;

  paintSource(true);
}

function renderSidebar() {
  const list = filteredEdges();
  $('#sb-title').textContent = project;
  $('#sb-count').textContent = list.length + ' edges';

  const clr = $('#clear-btn');
  if (ann.cleared) { clr.textContent = 'Restore detected relations'; clr.style.color = '#6c5ce7'; clr.style.borderColor = '#cfc9f2'; clr.onclick = restoreRelations; }
  else { clr.textContent = 'Clear all relations'; clr.style.color = ''; clr.style.borderColor = ''; clr.onclick = clearAllRelations; }

  const baseTypes = ['all', ...new Set(edges.map(e => relBase(e.type)))];
  $('#filters').innerHTML = baseTypes.map(t => {
    const c = t==='all' ? '#666' : (REL_COLOR[t] || '#777');
    const on = typeFilter === t;
    return `<button class="fchip ${on?'on':''}" style="${on?`background:${c}`:''}" onclick="setTypeFilter('${t}')">${t}</button>`;
  }).join('') + `
    <select class="fsel" onchange="setMarkFilter(this.value)">
      <option value="all" ${markFilter==='all'?'selected':''}>any status</option>
      <option value="unreviewed" ${markFilter==='unreviewed'?'selected':''}>unreviewed</option>
      <option value="agree" ${markFilter==='agree'?'selected':''}>✓ agreed</option>
      <option value="unsure" ${markFilter==='unsure'?'selected':''}>? unsure</option>
      <option value="reject" ${markFilter==='reject'?'selected':''}>✗ rejected</option>
    </select>`;

  $('#edge-list').innerHTML = list.map((e, i) => {
    const a = ann.edges[e.id] || {};
    const rc = REL_COLOR[e.type] || '#777';
    const st = a.mark ? `<span style="color:${MARK_COLOR[a.mark]}">${MARK_ICON[a.mark]}</span>` : '';
    return `<div class="edge-item ${i===idx?'sel':''}${e.user_added?' userrow':''}" onclick="goTo(${i})"
                 title="${e.source} → ${e.target} · ${esc(e.type)}">
      <span class="epair">${e.source} → ${e.target}</span>
      <span class="etype" style="color:${rc}">${esc(e.type)}</span>
      ${a.comment ? '<span class="cdot" title="has comment">💬</span>' : ''}
      <span class="status">${st}</span>
    </div>`;
  }).join('');
  const sel = $('.edge-item.sel');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function renderProgress() {
  const total = edges.length;
  const done = edges.filter(e => (ann.edges[e.id]||{}).mark).length;
  $('#p-done').textContent = done;
  $('#p-total').textContent = total;
  $('#p-fill').style.width = total ? (100*done/total)+'%' : '0%';
}

function shorten(s, n=28) { s = s || ''; return s.length > n ? s.slice(0, n-1) + '…' : s; }
function esc(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function goTo(i) { flushComment(); idx = i; localStorage.setItem('rri-idx-'+project, idx); renderAll(); }
function step(d) {
  const n = filteredEdges().length;
  if (n) goTo((idx + d + n) % n);
}
function setTypeFilter(t) { flushComment(); typeFilter = t; idx = 0; renderAll(); }
function setMarkFilter(m) { flushComment(); markFilter = m; idx = 0; renderAll(); }

async function post(body) {
  try {
    const res = await fetch('/api/annotations/'+project, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    ann = await res.json();
    rebuildEdges();
    return true;
  } catch (err) {
    const el = $('#savestate');
    if (el) el.textContent = '⚠ not saved — is the server running?';
    console.error('save failed', err);
    return false;
  }
}

async function setMark(eid, m) {
  const cur = (ann.edges[eid]||{}).mark;
  const next = cur === m ? null : m;
  // optimistic local update so the UI responds instantly and survives save errors
  const e = ann.edges[eid] || (ann.edges[eid] = {});
  e.mark = next;
  if (!e.mark && !e.comment) delete ann.edges[eid];
  renderAll();
  await post({action:'annotate', edge_id: eid, mark: next});
  renderAll();
}

function queueComment(eid) {
  clearTimeout(saveTimer);
  $('#savestate').textContent = 'typing…';
  saveTimer = setTimeout(async () => {
    await post({action:'annotate', edge_id: eid, comment: $('#comment').value});
    const el = $('#savestate'); if (el) el.textContent = 'saved ✓';
    renderSidebar(); renderProgress();
  }, 600);
}
function flushComment() { clearTimeout(saveTimer); saveTimer = null; }

/* ----- add edge modal ----- */
function openModal(srcId, tgtId) {
  const opts = Object.values(data.nodes)
    .sort((a,b) => a.id.localeCompare(b.id, undefined, {numeric:true}))
    .map(n => `<option value="${n.id}">${n.id} — ${esc(n.title)}</option>`).join('');
  $('#m-source').innerHTML = opts; $('#m-target').innerHTML = opts;
  const cur = filteredEdges()[idx];
  const s = srcId || (cur && cur.source), t = tgtId || (cur && cur.target);
  if (s) $('#m-source').value = s;
  if (t) $('#m-target').value = t;
  $('#m-rationale').value = '';
  $('#modal').classList.add('open');
}
function closeModal() { $('#modal').classList.remove('open'); }
async function submitEdge() {
  const e = { source: $('#m-source').value, target: $('#m-target').value,
              type: $('#m-type').value, rationale: $('#m-rationale').value.trim() };
  if (e.source === e.target) { alert('Source and target are the same node.'); return; }
  await post({action:'add_edge', edge: e});
  closeModal();
  clearSel();
  typeFilter = 'all'; markFilter = 'all';
  idx = filteredEdges().length - 1;
  renderAll();
}
async function removeAdded(eid) {
  if (!confirm('Delete this user-added relation?')) return;
  await post({action:'remove_added', edge_id: eid});
  if (idx >= filteredEdges().length) idx = Math.max(0, filteredEdges().length - 1);
  renderAll();
}

/* ----- pick two spans → relation ----- */
function selectNode(nid, shift) {
  if (!nid) return;
  if (!shift) {                       // plain click sets the source, clears target
    selSource = nid; selTarget = null;
  } else {                            // shift-click sets/replaces the target
    if (!selSource) selSource = nid;
    else if (nid !== selSource) selTarget = nid;
  }
  renderSelBar(); paintSource(false);
}
function swapSel() { [selSource, selTarget] = [selTarget, selSource]; renderSelBar(); paintSource(false); }
function clearSel() { selSource = selTarget = null; renderSelBar(); if (srcLines.length) paintSource(false); }
function pill(id, cls, empty) {
  const el = $(id);
  if (!cls) { el.className = 'pill empty'; el.textContent = empty; }
  else { el.className = 'pill ' + cls; el.textContent = data.nodes[cls === 's' ? selSource : selTarget].id; }
}
function renderSelBar() {
  const bar = $('#sel-bar');
  if (!selSource && !selTarget) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  pill('#sel-s', selSource ? 's' : '', 'pick source');
  pill('#sel-t', selTarget ? 't' : '', 'shift-click target');
}
function addRelationFromSel() {
  if (!selSource || !selTarget) { setToast && 0; return; }
  openModal(selSource, selTarget);
}

/* ----- select raw text → add a rule/context ----- */
let pendingSel = null;   // {text, char_start, char_end, line_start, line_end, source_lines}
function onSrcMouseUp() {
  const sel = window.getSelection();
  const txt = sel && sel.toString();
  if (!txt || !txt.trim()) { hideAddRulePop(); return; }
  const range = sel.getRangeAt(0);
  const startLine = range.startContainer.parentElement && range.startContainer.parentElement.closest('.srcline');
  const endLine = range.endContainer.parentElement && range.endContainer.parentElement.closest('.srcline');
  if (!startLine || startLine !== endLine) { hideAddRulePop(); return; }   // keep it to one line
  const li = +startLine.id.split('-')[1] - 1;
  const lntext = startLine.querySelector('.lntext');
  const pre = document.createRange(); pre.selectNodeContents(lntext); pre.setEnd(range.startContainer, range.startOffset);
  const start = pre.toString().length;
  pendingSel = {
    text: txt.trim(),
    char_start: srcLineOffsets[li] + start, char_end: srcLineOffsets[li] + start + txt.length,
    line_start: li + 1, line_end: li + 1, source_lines: String(li + 1),
  };
  const r = range.getBoundingClientRect(), pane = $('#source-pane').getBoundingClientRect();
  const pop = $('#add-rule-pop');
  pop.style.left = Math.max(6, r.left - pane.left) + 'px';
  pop.style.top = (r.bottom - pane.top + 6) + 'px';
  pop.classList.add('show');
}
function hideAddRulePop() { $('#add-rule-pop').classList.remove('show'); pendingSel = null; }
async function addNodeFromSelection(type) {
  if (!pendingSel) return;
  const kind = type === 'CONTEXT' ? 'context' : 'rule';
  await post({ action: 'add_node', node: { ...pendingSel, type, kind, title: pendingSel.text } });
  mergeUserNodes();
  hideAddRulePop();
  window.getSelection().removeAllRanges();
  renderSourceShell();          // repaint with the new grey span
  setToast(`Added ${type} from selection`);
}

/* ----- clear / restore relations ----- */
async function clearAllRelations() {
  if (!confirm('Clear ALL relations for this file (detected + added)? This cannot be undone except by re-running detection.')) return;
  await post({ action: 'clear_relations' });
  clearSel(); idx = 0; renderAll();
}
async function restoreRelations() { await post({ action: 'restore_relations' }); idx = 0; renderAll(); }

function setToast(msg) {
  const el = $('#savestate'); if (el) el.textContent = msg;
}

// source-pane interactions
$('#src-body').addEventListener('click', ev => {
  if (window.getSelection().toString().trim()) return;       // a text selection, not a node pick
  const span = ev.target.closest('[data-nid]');
  if (span) selectNode(span.getAttribute('data-nid'), ev.shiftKey);
});
$('#src-body').addEventListener('mouseup', () => setTimeout(onSrcMouseUp, 0));

document.addEventListener('keydown', ev => {
  const modalOpen = $('#modal').classList.contains('open');
  if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') {   // ⌘⏎ add relation from picks
    if (modalOpen) { ev.preventDefault(); submitEdge(); }
    else if (selSource && selTarget) { ev.preventDefault(); addRelationFromSel(); }
    return;
  }
  if (ev.target.tagName === 'TEXTAREA' || ev.target.tagName === 'SELECT' || $('#modal').classList.contains('open')) {
    if (ev.key === 'Escape') closeModal();
    return;
  }
  if (ev.key === 'Escape') { clearSel(); hideAddRulePop(); return; }
  const e = filteredEdges()[idx];
  if (ev.key === 'ArrowRight' || ev.key === 'j') step(1);
  else if (ev.key === 'ArrowLeft' || ev.key === 'k') step(-1);
  else if (e && ev.key === '1') setMark(e.id, 'agree');
  else if (e && ev.key === '2') setMark(e.id, 'unsure');
  else if (e && ev.key === '3') setMark(e.id, 'reject');
});

// populate add-rule type buttons once
$('#arp-types').innerHTML = [['PROHIBITION','🚫'],['PRESCRIPTION','✅'],['PREFERENCE','💡'],['PERMISSION','🔓'],['CONTEXT','🗒']]
  .map(([t,ic]) => `<button style="color:${TYPE_COLOR[t]}" onclick="addNodeFromSelection('${t}')">${ic} ${t[0]+t.slice(1).toLowerCase()}</button>`).join('');

init();
</script>
</body>
